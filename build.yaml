# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # --- Bluetooth-only: flash to the keyboard to connect directly to the host ---
  - board: nice_nano_v2
    shield: freezepad
    artifact-name: freezepad_bluetooth

  # --- Dongle + keyboard ---
  # Keyboard as a split peripheral (talks to the dongle, not the host)
  - board: nice_nano_v2
    shield: freezepad
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: freezepad_peripheral
  # Dongle: split central, connects to the host
  - board: nice_nano_v2
    shield: freezepad_dongle
    artifact-name: freezepad_dongle

  # --- Utility: clears bonds/settings when switching between the two modes ---
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
